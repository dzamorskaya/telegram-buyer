services:
  - type: web
    name: telegram-buyer
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: APP_NAME
        value: Telegram Buyer
      - key: AUTOPOST_ENABLED
        value: "false"
      - key: AUTOPOST_INTERVAL_MIN
        value: "180"
